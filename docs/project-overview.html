    const sl = slides[cur];

    pbar.style.background = sl.accent;
    pbar.style.boxShadow = '0 0 12px ' + sl.accent;

  }

  function go(idx) {
    if (moving || idx === cur || idx < 0 || idx >= slides.length) return;
    moving = true;
    const dir = idx > cur ? 'eu' : 'ed';
    const prev = els[cur], next = els[idx];
    prev.classList.remove('on'); prev.classList.add(dir);
    next.querySelectorAll('.A').forEach(el => { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; });
    next.classList.remove('eu', 'ed'); next.classList.add('on');
    cur = idx; ui();
    setTimeout(() => { prev.classList.remove('eu', 'ed'); moving = false; }, 550);
  }

  ui();

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') go(cur + 1);
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') go(cur - 1);
  });

  let lastWheelT = 0;
  document.addEventListener('wheel', e => {
    e.preventDefault();
    const now = Date.now();
    if (now - lastWheelT < 700) return;
    if (Math.abs(e.deltaY) < 10) return;
    lastWheelT = now;
    go(e.deltaY > 0 ? cur + 1 : cur - 1);
  }, { passive: false });

  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 50) go(dy > 0 ? cur + 1 : cur - 1);
  }, { passive: true });

  app.addEventListener('click', e => {
    if (e.target.closest('.dot')) return;
    go(cur + 1);
  });

})();
